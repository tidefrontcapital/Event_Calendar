<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tide Front Capital — Event Calendar</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#121821; --panel2:#0f141c; --line:#1f2937; --muted:#8b9bb0;
    --text:#e7edf5; --accent:#3ba776; --accent2:#4f8cff; --red:#e5544b; --green:#2ecc8f;
    --chip:#1b2430; --gold:#d8a657; --purple:#a78bfa; --teal:#43c6c0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent2)}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 18px 80px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;letter-spacing:.5px}
  .brand h1{font-size:19px;margin:0;letter-spacing:.3px}
  .brand .sub{color:var(--muted);font-size:12px}
  .src{color:var(--muted);font-size:12px;text-align:right;max-width:340px}
  .src .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .src .live{background:var(--green)} .src .sample{background:var(--gold)} .src .err{background:var(--red)}
  .src button, .filebtn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 10px;font:inherit;font-size:12px;cursor:pointer;margin-left:6px}
  .src button:hover,.filebtn:hover{border-color:var(--accent2)}

  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:18px 0}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;min-width:0}
  .kpi .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  .kpi .val{font-size:22px;font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kpi .val.small{font-size:15px}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:2px}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0}
  select,input[type=search]{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;font:inherit}
  input[type=search]{min-width:200px;flex:1}
  .chk{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;user-select:none;cursor:pointer}

  .daygroup{margin:22px 0 0}
  .dayhead{display:flex;align-items:baseline;gap:10px;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  .dayhead .d{font-size:15px;font-weight:800;letter-spacing:.2px}
  .dayhead .wd{color:var(--muted);font-size:12px;font-weight:600}
  .dayhead .cd{margin-left:auto;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--chip);border:1px solid var(--line);color:var(--muted)}
  .cd.today{background:#10331f;color:#56d39a;border-color:#1c5738}
  .cd.soon{background:#0f2a3d;color:#6cb6ff;border-color:#1c405a}
  .cd.past{opacity:.6}

  .card{background:var(--panel);border:1px solid var(--line);border-left-width:3px;border-radius:11px;padding:12px 14px;margin:8px 0;display:grid;grid-template-columns:66px 1fr auto;gap:12px;align-items:start}
  .card .time{font-size:12px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;padding-top:2px}
  .card .body{min-width:0}
  .card .title{font-size:14px;font-weight:700;margin:0 0 4px}
  .card .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
  .card .detail{font-size:12.5px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 16px}
  .card .detail b{color:var(--text);font-weight:600}
  .tick{font-size:11px;font-weight:700;color:#cdd8e6;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
  .imp{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
  .st-Confirmed{background:#10331f;color:#56d39a} .st-Wait{background:#3a2a12;color:#e6b25a}
  .macro{display:inline-block;padding:1px 7px;border-radius:5px;font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:#0f2a3d;color:#6cb6ff;border:1px solid #1c405a;vertical-align:middle}
  .card .time .et{color:var(--text);font-weight:800} .card .time .sess{display:block;font-size:10px;color:var(--muted);font-weight:600;margin-top:1px}

  .empty{text-align:center;color:var(--muted);padding:50px 20px;border:1px dashed var(--line);border-radius:12px;margin-top:20px}
  footer{color:var(--muted);font-size:11.5px;margin-top:34px;border-top:1px solid var(--line);padding-top:14px;line-height:1.7}

  @media (max-width:720px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .card{grid-template-columns:56px 1fr;}
    .card .imp{grid-column:2;justify-self:start;margin-top:2px}
  }

  /* ---- week bar ---- */
  .weekbar{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:10px 0 4px}
  .wb-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .wb-month{font-size:14px;font-weight:800;letter-spacing:.2px}
  .wb-actions{display:flex;gap:6px}
  .wb-btn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:5px 11px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .wb-btn:hover{border-color:var(--accent2);color:var(--text)}
  .wb-strip{display:flex;align-items:stretch;gap:8px}
  .wb-nav{flex:0 0 auto;width:34px;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:9px;font-size:18px;line-height:1;cursor:pointer}
  .wb-nav:hover{border-color:var(--accent2)}
  .wb-days{flex:1;display:grid;grid-template-columns:repeat(7,1fr);gap:8px;min-width:0}
  .daytab{position:relative;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 4px;cursor:pointer;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:2px;transition:.12s}
  .daytab:hover{border-color:var(--accent2)}
  .daytab .dt-wd{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.3px}
  .daytab .dt-dt{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
  .daytab .dt-n{position:absolute;top:5px;right:6px;font-size:9px;font-weight:800;background:var(--accent2);color:#fff;border-radius:9px;min-width:15px;height:15px;line-height:15px;text-align:center;padding:0 3px}
  .daytab.today{border-color:#1c5738;background:#0e1f18}
  .daytab.today .dt-dt{color:var(--green)}
  .daytab.sel{border-color:var(--accent2);background:#12233d;box-shadow:0 0 0 1px var(--accent2) inset}
  .daytab.wknd{opacity:.5}
  /* ---- week overview ---- */
  .overview{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:12px}
  .ov-col{background:var(--panel);border:1px solid var(--line);border-radius:11px;min-height:120px;cursor:pointer;overflow:hidden;transition:.12s}
  .ov-col:hover{border-color:var(--accent2)}
  .ov-col.today{border-color:#1c5738}
  .ov-col.wknd{opacity:.6}
  .ov-head{padding:8px 9px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .ov-head .ov-wd{display:block;font-size:11px;color:var(--muted);font-weight:700}
  .ov-head .ov-dt{font-size:13px;font-weight:800}
  .ov-col.today .ov-head .ov-dt{color:var(--green)}
  .ov-body{padding:7px}
  .ov-item{display:flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);border-left-width:3px;border-radius:7px;padding:4px 6px;margin-bottom:5px}
  .ov-item:last-child{margin-bottom:0}
  .ov-item .ov-t{color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:10.5px}
  .ov-item .ov-e{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11.5px}
  .ov-item .ov-macro{font-size:8.5px;font-weight:900;color:#6cb6ff;border:1px solid #1c405a;border-radius:4px;padding:0 3px}
  .ov-empty{color:#3a4759;text-align:center;font-size:12px;padding:16px 0}
  /* ---- day detail ---- */
  .dd-head{display:flex;align-items:center;gap:12px;margin:18px 0 6px}
  .dd-head .dd-wd{color:var(--muted);font-size:13px;font-weight:700}
  .dd-head .dd-date{font-size:18px;font-weight:800}
  .dd-head .cd{margin-left:auto;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;background:var(--chip);border:1px solid var(--line);color:var(--muted)}
  .dd-sec{margin:16px 0}
  .dd-sectitle{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--accent2);margin:0 0 7px;display:flex;align-items:center;gap:8px}
  .dd-cnt{font-size:10px;color:var(--muted);background:var(--chip);border:1px solid var(--line);border-radius:10px;padding:1px 7px;font-weight:700}
  .tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:11px}
  .dd-tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:660px}
  .dd-tbl th{text-align:left;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:9px 11px;background:var(--panel2);border-bottom:1px solid var(--line);white-space:nowrap}
  .dd-tbl td{padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
  .dd-tbl tr:last-child td{border-bottom:none}
  .dd-tbl tbody tr:hover td{background:var(--panel2)}
  .dd-tbl .c-time{font-weight:800;color:var(--text);white-space:nowrap;font-variant-numeric:tabular-nums}
  .dd-tbl .c-ev{font-weight:700;white-space:nowrap}
  .dd-tbl .c-x{color:var(--muted)}
  .dd-tbl .c-note{color:var(--muted);min-width:180px}
  @media (max-width:820px){
    .daytab{padding:7px 2px}
    .daytab .dt-wd{font-size:9.5px}
    .daytab .dt-dt{font-size:11.5px}
    .daytab .dt-n{min-width:13px;height:13px;line-height:13px;font-size:8px}
    .overview{grid-template-columns:1fr;gap:6px}
    .ov-col{min-height:0}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">TF</div>
      <div>
        <h1>Tide Front Capital</h1>
        <div class="sub">Market Event Calendar</div>
      </div>
    </div>
    <div class="src" id="srcBox">
      <div><span class="dot sample"></span><span id="srcText">Loading…</span></div>
      <div style="margin-top:6px">
        <button id="refreshBtn" title="Reload data">↻ Refresh</button>
        <label class="filebtn" title="Open a local .xlsx">📂 Open file<input id="fileInput" type="file" accept=".xlsx" hidden></label>
      </div>
    </div>
  </header>

  <div class="kpis" id="kpis"></div>

  <div class="controls">
    <input type="search" id="q" placeholder="Search event, ticker, note…">
    <select id="catSel"><option value="">All categories</option></select>
    <select id="statusSel">
      <option value="">All status</option>
      <option>Confirmed</option><option>Wait</option>

  </div>

  <div id="weekbar" class="weekbar"></div>
  <div id="list"></div>

  <footer id="footer"></footer>
</div>

   or a local file). This keeps the initial page fully self-contained and fast. */
let _xlsxPromise = null;
function ensureXLSX(){
  if(window.XLSX) return Promise.resolve();
  if(_xlsxPromise) return _xlsxPromise;
  _xlsxPromise = new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/xlsx@0.20.3/dist/xlsx.full.min.js";
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error("could not load spreadsheet reader"));
    document.head.appendChild(s);
  });
  return _xlsxPromise;
}

/* ---------------- data loading ---------------- */
function normalize(rows){
  // rows = array of objects keyed by header text from the Excel "Events" sheet
  const pick = (o, names) => { for(const n of names){ for(const k in o){ if(k.trim().toLowerCase()===n){ return (o[k]??"").toString().trim(); } } } return ""; };
  return rows.map(o=>({
    date:      fmtDate(pick(o,["event date","date"])),
    status:    pick(o,["status"]),
    session:   pick(o,["time / session","session"]),
    timeET:    pick(o,["time (et)","time et","time"]),
    event:     pick(o,["event","name"]),
    category:  pick(o,["category"]),
    tickers:   pick(o,["affected tickers","tickers","ticker"]),
    expected:  pick(o,["expected"]),
    actual:    pick(o,["actual / result","actual","result"]),
    reaction:  pick(o,["market reaction","reaction"]),
    notes:     pick(o,["notes","note"]),
  })).filter(e=>e.event && e.date);
}
function fmtDate(v){
  if(!v) return "";
  // Excel serial number?
  if(/^\d+(\.\d+)?$/.test(v)){
    const d = new Date(Date.UTC(1899,11,30) + Number(v)*86400000);
    return d.toISOString().slice(0,10);
  }
  const d = new Date(v);
  if(!isNaN(d)) return d.toISOString().slice(0,10);
  return v;
}
async function loadLive(url){
  await ensureXLSX();
  const res = await fetch(url);
  if(!res.ok) throw new Error("HTTP "+res.status);
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf, {type:"array"});
  const sheet = wb.Sheets["Events"] || wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});
  return normalize(rows);
}

  const reader = new FileReader();
  reader.onload = async e=>{
    try{
      await ensureXLSX();
      const wb = XLSX.read(e.target.result, {type:"array"});
      const sheet = wb.Sheets["Events"] || wb.Sheets[wb.SheetNames[0]];
      EVENTS = normalize(XLSX.utils.sheet_to_json(sheet,{defval:""}));
      setSrc("live", "Loaded from file: "+file.name);
      buildCats(); render();
    }catch(err){ setSrc("err","Could not read file: "+err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function setSrc(kind, text){
  const dot = {live:"live",sample:"sample",err:"err"}[kind]||"sample";
  document.getElementById("srcText").innerHTML = text;
  document.querySelector("#srcBox .dot").className = "dot "+dot;
}

/* ---------------- date helpers ---------------- */
function today0(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function parseD(s){ const p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function daysBetween(a,b){ return Math.round((a-b)/86400000); }
function countdown(dateStr){
  const n = daysBetween(parseD(dateStr), today0());
  if(n===0) return {t:"Today", cls:"today"};
  if(n===1) return {t:"Tomorrow", cls:"soon"};
  if(n>1 && n<=7) return {t:"in "+n+" days", cls:"soon"};
  if(n>7) return {t:"in "+n+" days", cls:""};
  if(n===-1) return {t:"Yesterday", cls:"past"};
  return {t:Math.abs(n)+" days ago", cls:"past"};
}
const WD=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function prettyDate(s){ const d=parseD(s); return `${MO[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; }

/* ---------------- UI ---------------- */
function buildCats(){
  const sel=document.getElementById("catSel");
  const cats=[...new Set(EVENTS.map(e=>e.category).filter(Boolean))].sort();
  sel.innerHTML='<option value="">All categories</option>'+cats.map(c=>`<option>${c}</option>`).join("");
}
function currentFilters(){
  return {
    q: document.getElementById("q").value.trim().toLowerCase(),
    cat: document.getElementById("catSel").value,
    status: document.getElementById("statusSel").value,
  };
}
function applyFilters(list){
  const f=currentFilters();
  return list.filter(e=>{
    if(f.cat && e.category!==f.cat) return false;
    if(f.status && e.status!==f.status) return false;
    if(f.q){
      const hay=(e.event+" "+e.tickers+" "+e.notes+" "+e.category+" "+e.reaction+" "+e.expected+" "+e.actual).toLowerCase();
      if(!hay.includes(f.q)) return false;
    }
    return true;
  });
}
function renderKpis(all){
  const t0=today0();
  const upcoming=all.filter(e=>daysBetween(parseD(e.date),t0)>=0).sort((a,b)=>a.date.localeCompare(b.date));
  const next=upcoming[0];
  const nextCd = next?countdown(next.date):null;
  const confN=upcoming.filter(e=>e.status==="Confirmed").length;
  const waitN=upcoming.filter(e=>e.status==="Wait").length;
  const earnN=upcoming.filter(e=>isEarnings(e.category) && !isCC(e)).length;
  const dates=all.map(e=>e.date).sort();
  const span = dates.length?`${prettyDate(dates[0])} – ${prettyDate(dates[dates.length-1])}`:"—";
  const tiles=[
    {label:"Events tracked", val:all.length, sub:`${upcoming.length} upcoming`},
    {label:"Next event", val: next?next.event:"—", cls:"small", sub: next?`${nextCd.t} · ${prettyDate(next.date)}`:""},
    {label:"Confirmed", val:confN, sub: waitN?`${waitN} awaiting`:"all set"},
    {label:"Companies reporting", val:earnN, sub:"upcoming"},
    {label:"Coverage", val:span, cls:"small", sub:`${dates.length} dated`},
  ];
  document.getElementById("kpis").innerHTML = tiles.map(t=>`
    <div class="kpi"><div class="label">${t.label}</div>
    <div class="val ${t.cls||''}">${t.val}</div>
    ${t.sub?`<div class="sub">${t.sub}</div>`:''}</div>`).join("");
}
function esc(s){ return (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function ticks(s){ return s.split(",").map(x=>x.trim()).filter(Boolean).map(x=>`<span class="tick">${esc(x)}</span>`).join(" "); }
const isCC = e => /\scc$/i.test((e.event||"").trim());
const isEarnings = c => { c=(c||"").trim(); return c==="E" || /earn/i.test(c); };
const isMacro = c => c==="Fed / Rates" || c==="Economic Data";
function mins(e){                     // minutes-since-midnight for chronological sort
  const m=(e.timeET||"").match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if(m){ let h=(+m[1])%12; if(/pm/i.test(m[3])) h+=12; return h*60 + (+m[2]); }
  const s=(e.session||"").toUpperCase();
  if(s==="BMO")  return 8*60;         // before open
  if(s==="AMC")  return 16*60+5;      // after close ~4:05pm (report lands before its call)
  if(s==="CALL") return 16*60+30;
  return 99999;                        // no time -> end of that day
}

/* ---------------- week / day views ---------------- */
let weekStart=null, selectedDay=null, VIEW=[];
const WDS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const WDL=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
function mondayOf(d){ const x=new Date(d); x.setHours(0,0,0,0); const w=(x.getDay()+6)%7; x.setDate(x.getDate()-w); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function iso(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function sessLabel(s){ s=(s||"").toUpperCase(); return ({BMO:"Pre-open",AMC:"After close",CALL:"Call"})[s]||s||""; }
function initWeek(){
  const t=today0(); let ws=mondayOf(t);
  const inWk=d=>{ const a=iso(ws), b=iso(addDays(ws,6)); return d>=a&&d<=b; };
  if(!VIEW.some(e=>inWk(e.date))){
    const up=VIEW.map(e=>e.date).filter(d=>d>=iso(t)).sort();
    if(up.length) ws=mondayOf(parseD(up[0]));
    else { const all=VIEW.map(e=>e.date).sort(); if(all.length) ws=mondayOf(parseD(all[all.length-1])); }
  }
  weekStart=ws; selectedDay=null;
}
function render(){
  VIEW=applyFilters(EVENTS);
  if(!weekStart) initWeek();
  renderKpis(EVENTS);
  renderWeekBar();
  const box=document.getElementById("list");
  box.innerHTML = selectedDay ? renderDayDetail(selectedDay) : renderWeekOverview();
}
function renderWeekBar(){
  const days=[...Array(7)].map((_,i)=>addDays(weekStart,i));
  const t=iso(today0()), a=weekStart, b=addDays(weekStart,6);
  const range = a.getMonth()===b.getMonth()
    ? `${MO[a.getMonth()]} ${a.getDate()}–${b.getDate()}, ${a.getFullYear()}`
    : `${MO[a.getMonth()]} ${a.getDate()} – ${MO[b.getMonth()]} ${b.getDate()}, ${b.getFullYear()}`;
  const tabs=days.map((d,i)=>{
    const ds=iso(d), n=VIEW.filter(e=>e.date===ds).length;
    const cls=[selectedDay===ds?"sel":"", ds===t?"today":"", i>=5?"wknd":""].filter(Boolean).join(" ");
    return `<button class="daytab ${cls}" data-day="${ds}">
      <span class="dt-wd">${WDS[i]}</span><span class="dt-dt">${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}</span>
      ${n?`<span class="dt-n">${n}</span>`:""}</button>`;
  }).join("");
  document.getElementById("weekbar").innerHTML=`
    <div class="wb-top">
      <div class="wb-month">${range}</div>
      <div class="wb-actions">
        ${selectedDay?`<button class="wb-btn" data-act="week">◱ Week view</button>`:""}
        <button class="wb-btn" data-act="today">● Today</button>
      </div>
    </div>
    <div class="wb-strip">
      <button class="wb-nav" data-act="prev" title="Previous week">‹</button>
      <div class="wb-days">${tabs}</div>
      <button class="wb-nav" data-act="next" title="Next week">›</button>
    </div>`;
}
function renderWeekOverview(){
  const days=[...Array(7)].map((_,i)=>addDays(weekStart,i));
  const t=iso(today0());
  const cols=days.map((d,i)=>{
    const ds=iso(d);
    const evs=VIEW.filter(e=>e.date===ds).sort((x,y)=>mins(x)-mins(y));
    const body = evs.length ? evs.map(e=>{
      const col=catColor(e.category), tm=e.timeET||sessLabel(e.session);
      return `<div class="ov-item" data-day="${ds}" style="border-left-color:${col.edge}">
        <span class="ov-t">${esc(tm||"·")}</span><span class="ov-e">${esc(e.event)}</span>
        ${isMacro(e.category)?'<span class="ov-macro">M</span>':""}</div>`;
    }).join("") : `<div class="ov-empty">—</div>`;
    return `<div class="ov-col ${ds===t?"today":""} ${i>=5?"wknd":""}" data-day="${ds}">
      <div class="ov-head"><span class="ov-wd">${WDL[i]}</span><span class="ov-dt">${MO[d.getMonth()]} ${d.getDate()}</span></div>
      <div class="ov-body">${body}</div></div>`;
  }).join("");
  return `<div class="overview">${cols}</div>`;
}
function renderDayDetail(ds){
  const d=parseD(ds), evs=VIEW.filter(e=>e.date===ds), cd=countdown(ds);
  const head=`<div class="dd-head"><div><span class="dd-wd">${WD[d.getDay()]}</span> <span class="dd-date">${prettyDate(ds)}</span></div><span class="cd ${cd.cls}">${cd.t}</span></div>`;
  if(!evs.length) return head+`<div class="empty">No events on this day.<br><span style="font-size:12px">Use ‹ › to browse weeks, or “Week view” for the overview.</span></div>`;
  const bt=(a,b)=>mins(a)-mins(b);
  const macro=evs.filter(e=>isMacro(e.category)).sort(bt);
  const earn=evs.filter(e=>isEarnings(e.category));
  const pre=earn.filter(e=>mins(e)<720).sort(bt);
  const post=earn.filter(e=>mins(e)>=720).sort(bt);
  const other=evs.filter(e=>!isMacro(e.category)&&!isEarnings(e.category)).sort(bt);
  return head + ddSection("Economic Data &amp; Fed",macro) + ddSection("US Earnings — Pre-market",pre)
    + ddSection("US Earnings — After close",post) + ddSection("Other",other);
}
function ddSection(title,list){
  if(!list.length) return "";
  const rows=list.map(e=>{
    const col=catColor(e.category);
    const tm=e.timeET?esc(e.timeET):(e.session?esc(sessLabel(e.session)):"—");
    return `<tr>
      <td class="c-time">${tm}</td>
      <td class="c-ev">${esc(e.event)}${isMacro(e.category)?' <span class="macro">Macro</span>':""}</td>
      <td><span class="pill" style="color:${col.c};background:${col.bg}">${esc(e.category||"Other")}</span></td>
      <td>${e.status?`<span class="imp st-${esc(e.status)}">${esc(e.status)}</span>`:"—"}</td>
      <td class="c-x">${esc(e.expected)||"—"}</td>
      <td class="c-x">${esc(e.actual)||"—"}</td>
      <td class="c-x">${esc(e.reaction)||"—"}</td>
      <td class="c-note">${esc(e.notes)||"—"}</td>
    </tr>`;
  }).join("");
  return `<div class="dd-sec"><div class="dd-sectitle">${title}<span class="dd-cnt">${list.length}</span></div>
    <div class="tblwrap"><table class="dd-tbl">
    <thead><tr><th>Time (ET)</th><th>Event</th><th>Category</th><th>Status</th><th>Expected</th><th>Actual</th><th>Reaction</th><th>Notes</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

/* ---------------- boot ---------------- */
function bootSample(msg){
  EVENTS=SAMPLE.slice();
  setSrc("sample", (msg||"")+"Showing bundled sample · connect OneDrive to go live");
  buildCats(); render();
}
async function boot(){
  if(DATA_URL){
    try{
      EVENTS = await loadLive(DATA_URL);
      const stamp=new Date().toLocaleString();
      setSrc("live", `Live from OneDrive · updated ${stamp}`);
      buildCats(); render(); return;
    }catch(err){ bootSample(`Couldn't load live data (${err.message}) — showing last bundled copy. `); return; }
  }
  bootSample("");
}
["input","change"].forEach(ev=>{
  document.addEventListener(ev,e=>{
    if(["q","catSel","statusSel"].includes(e.target.id)){ selectedDay=null; render(); }
  });
});
document.getElementById("weekbar").addEventListener("click",e=>{
  const act=e.target.closest("[data-act]"), day=e.target.closest("[data-day]");
  if(act){
    const a=act.dataset.act;
    if(a==="prev"){ weekStart=addDays(weekStart,-7); selectedDay=null; }
    else if(a==="next"){ weekStart=addDays(weekStart,7); selectedDay=null; }
    else if(a==="today"){ initWeek(); }
    else if(a==="week"){ selectedDay=null; }
    render();
  } else if(day){ selectedDay=day.dataset.day; weekStart=mondayOf(parseD(selectedDay)); render(); }
});
document.getElementById("list").addEventListener("click",e=>{
  const day=e.target.closest("[data-day]");
  if(day){ selectedDay=day.dataset.day; render(); }
});
document.getElementById("refreshBtn").onclick=boot;
document.getElementById("fileInput").onchange=e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); };
document.getElementById("footer").innerHTML=
  "Tide Front Capital — internal event tracker. Default view is the week; click any day for the full list, and use ‹ › to change week. Edit the shared Excel on OneDrive; this page reflects the latest saved version on refresh. "+
  "Macro events (Fed / Rates, Economic Data) are tagged “Macro”. Dates from the Fed FOMC calendar, company IR sites (earnings + call times) and the BEA; items marked “Wait” still need confirmation.";
boot();
</script>
